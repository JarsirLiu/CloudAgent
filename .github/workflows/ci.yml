name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-targets --no-fail-fast

      - name: Validate release tag helper
        shell: bash
        run: bash ./scripts/release_tag_rules.sh --self-test

      - name: Validate release tag helper (PowerShell)
        shell: pwsh
        run: ./scripts/validate-release-tag.ps1 -SelfTest

      - name: Validate release script helper
        shell: bash
        run: bash ./scripts/stage-release-scripts.sh --self-test

      - name: Smoke test installer fallback (shell)
        shell: bash
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT INT TERM
          cp ./scripts/install.sh "$temp_dir/install.sh"
          bash "$temp_dir/install.sh" --self-test

      - name: Smoke test installer fallback (PowerShell)
        shell: pwsh
        run: |
          $tempDir = New-Item -ItemType Directory -Path ([System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), "cloudagent-install-smoke-$PID")) -Force
          try {
              Copy-Item ./scripts/install.ps1 -Destination (Join-Path $tempDir.FullName "install.ps1")
              & (Join-Path $tempDir.FullName "install.ps1") -SelfTest
          }
          finally {
              Remove-Item -LiteralPath $tempDir.FullName -Recurse -Force
          }

      - name: Smoke test installer in-memory execution (PowerShell)
        shell: pwsh
        run: |
          $script = [scriptblock]::Create((Get-Content ./scripts/install.ps1 -Raw))
          & $script -SelfTest

      - name: Smoke test uninstaller fallback (shell)
        shell: bash
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT INT TERM
          cp ./scripts/uninstall.sh "$temp_dir/uninstall.sh"
          bash "$temp_dir/uninstall.sh" --self-test

      - name: Smoke test uninstaller fallback (PowerShell)
        shell: pwsh
        run: |
          $tempDir = New-Item -ItemType Directory -Path ([System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), "cloudagent-uninstall-smoke-$PID")) -Force
          try {
              Copy-Item ./scripts/uninstall.ps1 -Destination (Join-Path $tempDir.FullName "uninstall.ps1")
              & (Join-Path $tempDir.FullName "uninstall.ps1") -SelfTest
          }
          finally {
              Remove-Item -LiteralPath $tempDir.FullName -Recurse -Force
          }
