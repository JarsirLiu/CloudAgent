name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: x64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_os: macos
            asset_arch: x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_os: macos
            asset_arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p cloudagent -p cli -p node -p agentd

      - name: Prepare archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          PKG="cloudagent-${VERSION}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
          mkdir -p "dist/${PKG}"
          cp "target/${{ matrix.target }}/release/cloudagent" "dist/${PKG}/cloudagent"
          cp "target/${{ matrix.target }}/release/cli" "dist/${PKG}/cli"
          cp "target/${{ matrix.target }}/release/node" "dist/${PKG}/node"
          cp "target/${{ matrix.target }}/release/agentd" "dist/${PKG}/agentd"
          cp README.md "dist/${PKG}/README.md"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"

      - name: Prepare archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "manual" }
          $Pkg = "cloudagent-$Version-${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
          New-Item -ItemType Directory -Path "dist/$Pkg" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cloudagent.exe" "dist/$Pkg/cloudagent.exe"
          Copy-Item "target/${{ matrix.target }}/release/cli.exe" "dist/$Pkg/cli.exe"
          Copy-Item "target/${{ matrix.target }}/release/node.exe" "dist/$Pkg/node.exe"
          Copy-Item "target/${{ matrix.target }}/release/agentd.exe" "dist/$Pkg/agentd.exe"
          Copy-Item "README.md" "dist/$Pkg/README.md"
          Compress-Archive -Path "dist/$Pkg" -DestinationPath "dist/$Pkg.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect archives
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*

      - name: Publish bootstrap scripts
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          checksum_for() {
            local asset_name="$1"
            local checksum
            checksum="$(awk -v file="$asset_name" '$2 == file { print $1 }' "$GITHUB_WORKSPACE/release/SHA256SUMS")"
            if [ -z "$checksum" ]; then
              echo "missing checksum for $asset_name" >&2
              exit 1
            fi
            printf '%s\n' "$checksum"
          }

          LINUX_X64_SHA="$(checksum_for "cloudagent-${RELEASE_TAG}-linux-x64.tar.gz")"
          MACOS_X64_SHA="$(checksum_for "cloudagent-${RELEASE_TAG}-macos-x64.tar.gz")"
          MACOS_ARM64_SHA="$(checksum_for "cloudagent-${RELEASE_TAG}-macos-arm64.tar.gz")"
          WINDOWS_X64_SHA="$(checksum_for "cloudagent-${RELEASE_TAG}-windows-x64.zip")"

          BOOTSTRAP_DIR="$(mktemp -d)"
          git clone --depth 1 --branch release-bootstrap "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "$BOOTSTRAP_DIR" \
            || git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "$BOOTSTRAP_DIR"

          cd "$BOOTSTRAP_DIR"
          if ! git rev-parse --verify release-bootstrap >/dev/null 2>&1; then
            git checkout --orphan release-bootstrap
            git rm -rf . >/dev/null 2>&1 || true
          else
            git checkout release-bootstrap
          fi

          mkdir -p bootstrap
          cp "$GITHUB_WORKSPACE/scripts/install.sh" bootstrap/install.sh
          cp "$GITHUB_WORKSPACE/scripts/upgrade.sh" bootstrap/upgrade.sh
          cp "$GITHUB_WORKSPACE/scripts/uninstall.sh" bootstrap/uninstall.sh
          cp "$GITHUB_WORKSPACE/scripts/install.ps1" bootstrap/install.ps1
          cp "$GITHUB_WORKSPACE/scripts/upgrade.ps1" bootstrap/upgrade.ps1
          cp "$GITHUB_WORKSPACE/scripts/uninstall.ps1" bootstrap/uninstall.ps1
          printf '%s\n' "$RELEASE_TAG" > bootstrap/VERSION

          cat > bootstrap/latest.json <<JSON
          {
            "stable": "${RELEASE_TAG}",
            "assets": {
              "linux-x64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/cloudagent-${RELEASE_TAG}-linux-x64.tar.gz",
                "sha256": "${LINUX_X64_SHA}"
              },
              "macos-x64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/cloudagent-${RELEASE_TAG}-macos-x64.tar.gz",
                "sha256": "${MACOS_X64_SHA}"
              },
              "macos-arm64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/cloudagent-${RELEASE_TAG}-macos-arm64.tar.gz",
                "sha256": "${MACOS_ARM64_SHA}"
              },
              "windows-x64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/cloudagent-${RELEASE_TAG}-windows-x64.zip",
                "sha256": "${WINDOWS_X64_SHA}"
              }
            }
          }
          JSON

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bootstrap
          if git diff --cached --quiet; then
            echo "Bootstrap branch already up to date"
            exit 0
          fi

          git commit -m "chore(release): update bootstrap for ${RELEASE_TAG}"
          git push origin HEAD:release-bootstrap
