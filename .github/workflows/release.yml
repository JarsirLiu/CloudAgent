name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            linux_arch: amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            mac_pkg_arch: x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            mac_pkg_arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Go
        if: runner.os == 'Linux'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install nFPM
        if: runner.os == 'Linux'
        shell: bash
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p cli -p agentd

      - name: Prepare package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          PKG="cloudagent-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${PKG}"
          cp "target/${{ matrix.target }}/release/cloudagent" "dist/${PKG}/cloudagent"
          cp "target/${{ matrix.target }}/release/agentd" "dist/${PKG}/agentd"
          cp README.md "dist/${PKG}/README.md"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"

      - name: Build Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKGROOT="dist/linux-root"
          mkdir -p "${PKGROOT}"
          cp "target/${{ matrix.target }}/release/cloudagent" "${PKGROOT}/cloudagent"
          cp "target/${{ matrix.target }}/release/agentd" "${PKGROOT}/agentd"
          cp README.md "${PKGROOT}/README.md"
          export PATH="${PATH}:$(go env GOPATH)/bin"
          export NFPM_VERSION="${VERSION:-manual}"
          export NFPM_ARCH="${{ matrix.linux_arch }}"
          export NFPM_HOMEPAGE="https://github.com/${{ github.repository }}"
          nfpm pkg --config packaging/nfpm.yaml --packager deb --target "dist/cloudagent-${NFPM_VERSION}-${{ matrix.target }}.deb"
          nfpm pkg --config packaging/nfpm.yaml --packager rpm --target "dist/cloudagent-${NFPM_VERSION}-${{ matrix.target }}.rpm"

      - name: Build macOS installer package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PAYLOAD_ROOT="dist/pkgroot"
          INSTALL_ROOT="${PAYLOAD_ROOT}/usr/local/bin"
          mkdir -p "${INSTALL_ROOT}"
          cp "target/${{ matrix.target }}/release/cloudagent" "${INSTALL_ROOT}/cloudagent"
          cp "target/${{ matrix.target }}/release/agentd" "${INSTALL_ROOT}/agentd"
          chmod 755 "${INSTALL_ROOT}/cloudagent" "${INSTALL_ROOT}/agentd"
          pkgbuild \
            --root "${PAYLOAD_ROOT}" \
            --identifier "com.liufelix.cloudagent.${{ matrix.mac_pkg_arch }}" \
            --version "${VERSION:-manual}" \
            --install-location "/" \
            "dist/cloudagent-${VERSION:-manual}-${{ matrix.target }}.pkg"

      - name: Prepare package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "manual" }
          $Pkg = "cloudagent-$Version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$Pkg" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cloudagent.exe" "dist/$Pkg/cloudagent.exe"
          Copy-Item "target/${{ matrix.target }}/release/agentd.exe" "dist/$Pkg/agentd.exe"
          Copy-Item "README.md" "dist/$Pkg/README.md"
          Compress-Archive -Path "dist/$Pkg/*" -DestinationPath "dist/$Pkg.zip" -Force

      - name: Install cargo-wix
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo install cargo-wix --locked

      - name: Build MSI installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pwsh ./scripts/package-windows.ps1 `
            -Target "${{ matrix.target }}" `
            -Version "${env:GITHUB_REF_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.msi
            dist/*.pkg
            dist/*.deb
            dist/*.rpm

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect archives
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.msi" -o -name "*.pkg" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
