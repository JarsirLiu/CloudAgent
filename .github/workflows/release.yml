name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: x64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_os: macos
            asset_arch: x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_os: macos
            asset_arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: pwsh
        run: ./scripts/validate-release-tag.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p cloudagent -p cli -p node -p agentd

      - name: Prepare archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          PKG="cloudagent-${VERSION}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
          mkdir -p "dist/${PKG}"
          cp "target/${{ matrix.target }}/release/cloudagent" "dist/${PKG}/cloudagent"
          cp "target/${{ matrix.target }}/release/cli" "dist/${PKG}/cli"
          cp "target/${{ matrix.target }}/release/node" "dist/${PKG}/node"
          cp "target/${{ matrix.target }}/release/agentd" "dist/${PKG}/agentd"
          cp README.md "dist/${PKG}/README.md"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"

      - name: Prepare archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "manual" }
          $Pkg = "cloudagent-$Version-${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
          New-Item -ItemType Directory -Path "dist/$Pkg" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cloudagent.exe" "dist/$Pkg/cloudagent.exe"
          Copy-Item "target/${{ matrix.target }}/release/cli.exe" "dist/$Pkg/cli.exe"
          Copy-Item "target/${{ matrix.target }}/release/node.exe" "dist/$Pkg/node.exe"
          Copy-Item "target/${{ matrix.target }}/release/agentd.exe" "dist/$Pkg/agentd.exe"
          Copy-Item "README.md" "dist/$Pkg/README.md"
          Compress-Archive -Path "dist/$Pkg" -DestinationPath "dist/$Pkg.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: pwsh
        run: ./scripts/validate-release-tag.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Generate release notes from tag commit message
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          notes_path="${RUNNER_TEMP}/release-notes.md"

          git log -1 --format=%B "${commit}" > "${notes_path}"
          echo >> "${notes_path}"

          echo "path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect archives
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Stage release scripts and metadata
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/stage-release-scripts.sh --self-test
          export RELEASE_TAG="${GITHUB_REF_NAME}"
          export OUTPUT_DIR="release"
          export LINUX_X64_SHA="$(sha256sum "release/cloudagent-${GITHUB_REF_NAME}-linux-x64.tar.gz" | awk '{print $1}')"
          export MACOS_X64_SHA="$(sha256sum "release/cloudagent-${GITHUB_REF_NAME}-macos-x64.tar.gz" | awk '{print $1}')"
          export MACOS_ARM64_SHA="$(sha256sum "release/cloudagent-${GITHUB_REF_NAME}-macos-arm64.tar.gz" | awk '{print $1}')"
          export WINDOWS_X64_SHA="$(sha256sum "release/cloudagent-${GITHUB_REF_NAME}-windows-x64.zip" | awk '{print $1}')"
          bash ./scripts/stage-release-scripts.sh

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          body_path: ${{ steps.release_notes.outputs.path }}
          overwrite_files: true
          make_latest: ${{ !contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
